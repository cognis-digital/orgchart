apiVersion: apps/v1
kind: Deployment
metadata: { name: orgchart, labels: { app: orgchart } }
spec:
  replicas: 1
  selector: { matchLabels: { app: orgchart } }
  template:
    metadata: { labels: { app: orgchart } }
    spec:
      containers:
        - name: orgchart
          image: ghcr.io/cognis-digital/orgchart:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: orgchart }
spec:
  selector: { app: orgchart }
  ports: [{ port: 80, targetPort: 8000 }]
